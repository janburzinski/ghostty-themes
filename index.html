<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ghostty Themes</title>
<style>
  :root {
    --bg: #0b0b0c;
    --fg: #e6e6e6;
    --muted: #888;
    --card: #131316;
    --border: #23232a;
    --accent: #7aa2f7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  header { padding: 24px 32px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(11,11,12,.85); backdrop-filter: blur(12px); z-index: 10; }
  h1 { margin: 0 0 12px; font-size: 20px; letter-spacing: -.01em; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input, select, button {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 8px; font-size: 13px; font-family: inherit;
  }
  input { min-width: 240px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  .count { color: var(--muted); font-size: 12px; margin-left: auto; }
  main { padding: 24px 32px; display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; cursor: pointer; transition: transform .15s, border-color .15s; }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card-head { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #2a2a32; color: var(--muted); font-weight: 500; }
  .badge.light { background: #ffeaa7; color: #2d3436; }
  .term { padding: 14px; font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px; line-height: 1.55; min-height: 220px; }
  .term .row { white-space: pre; }
  .swatches { display: grid; grid-template-columns: repeat(16, 1fr); height: 6px; }
  .swatches div { height: 100%; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    max-width: 900px; width: 100%; max-height: 90vh; overflow: auto; }
  .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .modal-head h2 { margin: 0; font-size: 16px; }
  .close { background: none; border: none; color: var(--fg); font-size: 22px; cursor: pointer; padding: 0 6px; }
  .modal-body { padding: 20px; display: grid; gap: 16px; }
  .mix-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mix-row label { font-size: 12px; color: var(--muted); min-width: 60px; }
  pre.config { background: #08080a; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; font-size: 12px; overflow: auto; margin: 0; color: #c8c8c8;
    font-family: "SF Mono", Menlo, monospace; }
  .copy { font-size: 11px; padding: 6px 10px; }
</style>
</head>
<body>
<header>
  <h1>Ghostty Themes <span style="color:var(--muted);font-weight:400">— Browse, preview, and mix</span></h1>
  <div class="controls">
    <input id="search" placeholder="Search themes..." />
    <select id="filter">
      <option value="all">All</option>
      <option value="dark">Dark only</option>
      <option value="light">Light only</option>
    </select>
    <button id="random">Random theme</button>
    <button id="mix">Mix light + dark</button>
    <span class="count" id="count"></span>
  </div>
</header>
<main id="grid"></main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle"></h2>
      <button class="close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div id="modalPreview"></div>
      <div class="mix-row" id="mixRow" style="display:none">
        <label>Light:</label>
        <select id="lightSel"></select>
        <label>Dark:</label>
        <select id="darkSel"></select>
      </div>
      <div>
        <div class="mix-row" style="margin-bottom:8px">
          <strong style="font-size:13px">Ghostty config</strong>
          <button class="copy" id="copyBtn" style="margin-left:auto">Copy</button>
        </div>
        <pre class="config" id="configOut"></pre>
      </div>
    </div>
  </div>
</div>

<script>
let THEMES = {};
let names = [];

const ANSI = {
  black:0, red:1, green:2, yellow:3, blue:4, magenta:5, cyan:6, white:7,
  bblack:8, bred:9, bgreen:10, byellow:11, bblue:12, bmagenta:13, bcyan:14, bwhite:15
};

function termPreview(t) {
  const p = t.palette;
  const bg = t.background || '#000', fg = t.foreground || '#fff';
  const c = (i) => p[i] || fg;
  const span = (color, text) => `<span style="color:${color}">${text}</span>`;
  const lines = [
    `${span(c(2), '➜')}  ${span(c(6), '~/code')} ${span(c(4), 'git:(')}${span(c(1), 'main')}${span(c(4), ')')} ${span(c(3), '✗')}`,
    `${span(c(8), '$')} ls -la`,
    `${span(c(4), 'drwxr-xr-x')}  ${span(fg, '12 user')}  ${span(c(3), '4.0K')} ${span(c(6), 'src/')}`,
    `${span(c(4), '-rw-r--r--')}  ${span(fg, ' 1 user')}  ${span(c(3), '2.1K')} ${span(c(2), 'README.md')}`,
    `${span(c(8), '$')} ${span(c(5), 'function')} ${span(c(4), 'greet')}${span(fg, '() {')}`,
    `    ${span(c(5), 'echo')} ${span(c(2), '"Hello, $1!"')}`,
    `${span(fg, '}')}`,
    `${span(c(8), '$')} ${span(c(9), 'error:')} file not found ${span(c(11), 'warning:')} deprecated`,
    `${span(c(10), '✓')} ${span(c(12), 'info')} ${span(c(13), 'debug')} ${span(c(14), 'trace')}`,
  ];
  const swatches = p.map(col => `<div style="background:${col || '#000'}"></div>`).join('');
  return `<div class="term" style="background:${bg};color:${fg}">
    ${lines.map(l => `<div class="row">${l}</div>`).join('')}
  </div>
  <div class="swatches">${swatches}</div>`;
}

function makeCard(name) {
  const t = THEMES[name];
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-head">
      <span>${name}</span>
      <span class="badge ${t.isLight?'light':''}">${t.isLight?'LIGHT':'DARK'}</span>
    </div>
    ${termPreview(t)}
  `;
  div.onclick = () => openModal(name);
  return div;
}

function configFor(name, t) {
  const lines = [`# ${name}`, `theme = ${name}`, '', '# Or inline:'];
  for (let i = 0; i < 16; i++) lines.push(`palette = ${i}=${t.palette[i]}`);
  for (const k of ['background','foreground','cursor-color','cursor-text','selection-background','selection-foreground']) {
    if (t[k]) lines.push(`${k} = ${t[k]}`);
  }
  return lines.join('\n');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filter').value;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = names.filter(n => {
    if (q && !n.toLowerCase().includes(q)) return false;
    const t = THEMES[n];
    if (f === 'dark' && t.isLight) return false;
    if (f === 'light' && !t.isLight) return false;
    return true;
  });
  document.getElementById('count').textContent = `${filtered.length} themes`;
  const slice = filtered.slice(0, 120);
  for (const n of slice) grid.appendChild(makeCard(n));
}

function openModal(name) {
  const t = THEMES[name];
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalPreview').innerHTML = termPreview(t);
  document.getElementById('configOut').textContent = configFor(name, t);
  document.getElementById('mixRow').style.display = 'none';
  document.getElementById('modalBg').classList.add('open');
}

function openMix() {
  const lights = names.filter(n => THEMES[n].isLight);
  const darks = names.filter(n => !THEMES[n].isLight);
  const lightSel = document.getElementById('lightSel');
  const darkSel = document.getElementById('darkSel');
  lightSel.innerHTML = lights.map(n => `<option>${n}</option>`).join('');
  darkSel.innerHTML = darks.map(n => `<option>${n}</option>`).join('');
  lightSel.value = lights[Math.floor(Math.random()*lights.length)];
  darkSel.value = darks[Math.floor(Math.random()*darks.length)];

  function update() {
    const l = lightSel.value, d = darkSel.value;
    document.getElementById('modalTitle').textContent = `Mix: ${l} ☀ + ${d} ☾`;
    const tL = THEMES[l], tD = THEMES[d];
    document.getElementById('modalPreview').innerHTML =
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>${termPreview(tL)}</div>
        <div>${termPreview(tD)}</div>
      </div>`;
    document.getElementById('configOut').textContent =
      `# Light + Dark mix in Ghostty\n# Set your default, then override per-mode:\n\n` +
      `theme = light:${l},dark:${d}\n\n` +
      `# --- ${l} (light) ---\n${configFor(l, tL)}\n\n` +
      `# --- ${d} (dark) ---\n${configFor(d, tD)}`;
  }
  lightSel.onchange = darkSel.onchange = update;
  update();
  document.getElementById('mixRow').style.display = 'flex';
  document.getElementById('modalBg').classList.add('open');
}

document.getElementById('modalClose').onclick = () =>
  document.getElementById('modalBg').classList.remove('open');
document.getElementById('modalBg').onclick = (e) => {
  if (e.target.id === 'modalBg') document.getElementById('modalBg').classList.remove('open');
};
document.getElementById('search').oninput = render;
document.getElementById('filter').onchange = render;
document.getElementById('random').onclick = () => openModal(names[Math.floor(Math.random()*names.length)]);
document.getElementById('mix').onclick = openMix;
document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('configOut').textContent);
  document.getElementById('copyBtn').textContent = 'Copied!';
  setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy', 1200);
};

fetch('themes.json').then(r => r.json()).then(data => {
  THEMES = data;
  names = Object.keys(data).sort();
  render();
});
</script>
</body>
</html>
